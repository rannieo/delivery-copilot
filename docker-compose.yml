services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-trixie
    container_name: delivery_copilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_password
      POSTGRES_DB: delivery_copilot
    ports:
      - "5432:5432"
    volumes:
      - delivery_copilot_pgdata:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_user -d delivery_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  delivery_copilot_pgdata:
